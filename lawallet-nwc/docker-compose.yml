version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lawallet-nwc_web_1
      APP_PORT: 2288
      PROXY_AUTH_ADD: "false"

  web:
    image: masize/lawallet-nwc:1.1.0
    environment:
      NODE_ENV: production
      PORT: 2288
      DATABASE_URL: "postgresql://lawallet:${APP_PASSWORD}@postgres:5432/lawallet"
      JWT_SECRET: "${APP_SEED}"
      # NWC listener pairing — pre-wired so the integration works out of the
      # box. The web app keeps working if the listener container is down.
      LISTENER_URL: "http://lawallet-nwc_listener_1:4100"
      LISTENER_AUTH_SECRET: "${APP_SEED}-listener"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "on-failure"
    stop_grace_period: "1m"
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://$$(hostname -i):2288/api/health\" >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  listener:
    image: masize/lawallet-nwc-listener:1.1.0
    environment:
      DATABASE_URL: "postgresql://lawallet:${APP_PASSWORD}@postgres:5432/lawallet"
      LISTENER_PORT: 4100
      LISTENER_AUTH_SECRET: "${APP_SEED}-listener"
      WEB_ORIGIN: "http://lawallet-nwc_web_1:2288"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "on-failure"
    stop_grace_period: "1m"
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4100/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    restart: "on-failure"
    environment:
      POSTGRES_USER: lawallet
      POSTGRES_PASSWORD: "${APP_PASSWORD}"
      POSTGRES_DB: lawallet
    volumes:
      - "${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawallet -d lawallet"]
      interval: 10s
      timeout: 5s
      retries: 10
